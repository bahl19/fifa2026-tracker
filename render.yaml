services:
  - type: web
    name: fifa2026-tracker
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --worker-class eventlet --workers 1 --bind 0.0.0.0:$PORT --timeout 120"
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.7"
